{% extends "main.html" %}

{% block extrahead %}
{{ super() }}
<meta name="darkreader-lock">
<style>
  /* Hide both sidebars on home page (but not on mobile — drawer uses the primary sidebar) */
  @media (min-width: 631px) {
    .md-sidebar--primary,
    .md-sidebar--secondary { display: none !important; }
  }
</style>
{% endblock %}

{% block tabs %}
<div class="hero-banner">
  <div class="hero-title">Charithw's Guide Hub</div>
</div>
{% endblock %}

{% block content %}
<div class="md-typeset home-body">
  {{ page.content }}
</div>
{% endblock %}
