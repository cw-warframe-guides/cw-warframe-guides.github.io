{% extends "main.html" %}

{% block extrahead %}
<style>
  /* Hide both sidebars on home page only */
  .md-sidebar--primary,
  .md-sidebar--secondary { display: none !important; }
  /* Let the content column fill the full width */
  .md-main__inner { margin: 0 !important; }
  .md-content { max-width: 100% !important; }
</style>
{% endblock %}

{% block content %}
<div class="hero-banner">
  <div class="hero-title">Charithw's Guide Hub</div>
</div>
<div class="md-typeset home-body">
  {{ page.content }}
</div>
{% endblock %}
