{% extends "main.html" %}

{% block extrahead %}
<style>
  @media (min-width: 631px) {
    .md-sidebar--primary,
    .md-sidebar--secondary { display: none !important; }
  }

  /* Equal left/right gutters */
  .md-content__inner {
    padding-left: 2.5rem !important;
    padding-right: 2.5rem !important;
  }

  /* Larger page title, centered across the full content width */
  .md-content h1 {
    font-size: 2rem !important;
    text-align: center;
  }

  /* Hide Material footer generator line */
  .md-footer-meta { display: none !important; }

  /* ── Jump To controls: hidden on desktop ── */
  .jump-to-fab     { display: none; }
  .jump-to-backdrop { display: none; }
  .jump-to-close-btn { display: none; }

  /* ── Mobile: floating Jump To panel ──────────────── */
  @media (max-width: 820px) {
    /* Detach sidebar from flex flow; overflow visible so close tab can poke out */
    .guide-index-sidebar {
      position: fixed;
      top: 4rem;
      right: 1rem;
      width: 270px;
      overflow: visible;
      z-index: 200;
      /* hidden state */
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .guide-index-sidebar.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* Inner scroll wrapper injected by JS */
    .jump-to-scroll {
      max-height: calc(100vh - 10rem);
      overflow-y: auto;
    }

    /* Close tab: small box poking out of the left side, flush with the top */
    .jump-to-close-btn {
      display: block;
      position: absolute;
      top: -1px;
      right: 100%;
      width: 1.8rem;
      height: 1.8rem;
      line-height: 1.8rem;
      text-align: center;
      background: #26221a;
      border: 1.5px solid #b59d47;
      border-right: none;
      border-radius: 2px 0 0 2px;
      color: #b59d47;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
    }

    .jump-to-close-btn:hover {
      color: #dbd2ad;
    }

    /* Floating trigger button */
    .jump-to-fab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      position: fixed;
      bottom: 2rem;
      right: 1.5rem;
      z-index: 201;
      background: #26221a;
      border: 1.5px solid #b59d47;
      border-radius: 3px;
      color: #b59d47;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .jump-to-fab:hover {
      background: #b59d47;
      color: #1c1c1c;
    }

    /* Invisible backdrop catches outside clicks */
    .jump-to-backdrop {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 199;
      pointer-events: none;
    }

    .jump-to-backdrop.is-open {
      pointer-events: auto;
    }
  }
</style>
{% endblock %}

{% block content %}
{{ super() }}
<button class="jump-to-fab" id="jump-to-fab" aria-label="Jump to section">
  <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
    <rect y="1"  width="16" height="2.5" rx="1"/>
    <rect y="6"  width="16" height="2.5" rx="1"/>
    <rect y="11" width="16" height="2.5" rx="1"/>
  </svg>
  Jump To
</button>
<div class="jump-to-backdrop" id="jump-to-backdrop"></div>
<script>
(function () {
  var fab      = document.getElementById('jump-to-fab');
  var backdrop = document.getElementById('jump-to-backdrop');
  var sidebar  = document.querySelector('.guide-index-sidebar');
  if (!fab || !sidebar) return;

  // Wrap sidebar's existing children in a scroll div
  var scrollDiv = document.createElement('div');
  scrollDiv.className = 'jump-to-scroll';
  while (sidebar.firstChild) scrollDiv.appendChild(sidebar.firstChild);
  sidebar.appendChild(scrollDiv);

  // Inject close tab (position: absolute, outside scroll div, pokes above panel)
  var closeBtn = document.createElement('button');
  closeBtn.className = 'jump-to-close-btn';
  closeBtn.setAttribute('aria-label', 'Close panel');
  closeBtn.textContent = '✕';
  sidebar.insertBefore(closeBtn, scrollDiv);

  // Set panel position: fixed below header on mobile, cleared on desktop
  function positionPanel() {
    sidebar.style.top = window.innerWidth <= 820 ? '4rem' : '';
  }
  positionPanel();
  window.addEventListener('resize', positionPanel);

  function open()  { sidebar.classList.add('is-open');    backdrop.classList.add('is-open'); }
  function close() { sidebar.classList.remove('is-open'); backdrop.classList.remove('is-open'); }

  fab.addEventListener('click', function (e) {
    e.stopPropagation();
    positionPanel(); // recalculate in case page shifted
    sidebar.classList.contains('is-open') ? close() : open();
  });

  closeBtn.addEventListener('click', close);
  backdrop.addEventListener('click', close);

  // Close when any jump link is clicked
  scrollDiv.querySelectorAll('a').forEach(function (a) {
    a.addEventListener('click', close);
  });
})();
</script>
{% endblock %}
